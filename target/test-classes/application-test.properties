    # =====================================================================
# Perfil de teste — substitui o MySQL por H2 em memória.
# Carregado automaticamente quando @ActiveProfiles("test") está presente.
# =====================================================================

# Datasource em memória (sem MySQL real necessário)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate cria o schema a partir das entidades JPA (ddl-auto=create-drop)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Desativa o Flyway no perfil de teste (o schema é criado pelo Hibernate)
spring.flyway.enabled=false